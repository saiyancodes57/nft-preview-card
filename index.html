<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>NFT Preview Card</title>
  </head>
  <body>
    <main>
      <div class="image-container">
        <img class="nft-img" src="images/image-equilibrium.jpg" alt="" />
        <div class="overlay">
          <img src="images/icon-view.svg" alt="" />
        </div>
      </div>
      <h1 class="title text-preset-1">Equilibrium #3429</h1>

      <p class="description text-preset-2">
        Our Equilibrium collection promotes balance and calm.
      </p>
      <section class="pricing-section" aria-label="Pricing and time left">
        <div class="pricing">
          <img src="images/icon-ethereum.svg" alt="Etherium" />
          <span class="price text-preset-3-semibold">0.041 ETH</span>
        </div>
        <div class="time-left">
          <img src="images/icon-clock.svg" alt="Clock" />
          <span>3 days</span>
        </div>
      </section>
      <hr class="divider" />
      <section class="creator-section" aria-label="Creator details">
        <img src="images/image-avatar.png" alt="Avatar" />
        <p class="creator-prefix text-preset-3-regular">
          Creation of <strong class="name">Jules Wyvern</strong>
        </p>
      </section>
    </main>
  </body>
</html>
